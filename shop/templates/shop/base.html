<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>My Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛒 MyShop</a>

        <div>
            <a href="/catalog/" class="btn btn-outline-light me-2">Каталог</a>
            <a href="/cart/" class="btn btn-outline-light">Корзина</a>
        </div>

        <div class="ms-auto d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="text-white me-2">{{ user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-sm">Выйти</button>
                </form>
            {% else %}
                <a href="/login/" class="btn btn-success btn-sm">Войти</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- 🔔 Messages -->
<div class="container mt-3">
    {% for message in messages %}
        <div class="alert alert-warning">{{ message }}</div>
    {% endfor %}
</div>

<!-- 📦 Content -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    MyShop © 2026
</footer>

</body>
</html>
